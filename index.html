<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#b23683">
  <meta name="description" content="Ninita e Lama — jogo infantil interativo">
  <title>Ninita e Lama</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./assets/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <button id="audio-button" class="audio-button" aria-label="Configurar o som" title="Som">🔊</button>

  <aside id="audio-panel" class="audio-panel" hidden>
    <h3>Som do jogo — aventura musical</h3>
    <label>
      <span>Música</span>
      <input id="music-volume" type="range" min="0" max="1" step="0.05" value="0.32">
    </label>
    <label>
      <span>Efeitos</span>
      <input id="effects-volume" type="range" min="0" max="1" step="0.05" value="0.70">
    </label>
    <button id="mute-button" class="btn btn-secondary">Desligar som</button>
    <a class="btn btn-text audio-credit-link" href="./creditos-audio.html" target="_blank" rel="noopener">
      Créditos dos sons reais
    </a>
    <button id="close-audio" class="btn btn-text">Fechar</button>
  </aside>

  <div id="app" class="app-shell">
    <noscript>Esta aplicação precisa de JavaScript para funcionar.</noscript>
  </div>

  <script src="./app.js"></script>
</body>
</html>
